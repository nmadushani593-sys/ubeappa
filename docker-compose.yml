version: '3.9'
services:
  mongodb:
    image: mongo:7
    container_name: whatsapp_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: whatsapp_platform
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: whatsapp_backend
    restart: always
    depends_on: [mongodb]
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/whatsapp_platform
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      OPENROUTER_API_KEY: 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
      OPENROUTER_MODEL: mistralai/mistral-7b-instruct:free
      FRONTEND_URL: http://localhost
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: whatsapp_frontend
    restart: always
    depends_on: [backend]
    ports:
      - "80:80"
volumes:
  mongo_data:
